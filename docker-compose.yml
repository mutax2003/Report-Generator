# Internal team host — use behind HTTPS + Entra ID / VPN (see docs/16-team-rollout.md).
services:
  esa-reports:
    build: .
    image: esa-report-generator:latest
    container_name: esa-reports
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - ESA_JSON_LOG=1
      - ESA_AUDIT_ENABLED=1
      - ESA_HOSTED_MODE=1
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - ESA_API_KEY=${ESA_API_KEY}
    volumes:
      # Optional: mount secrets for AI tab (do not commit secrets.toml)
      # - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
      - ./.streamlit/config.toml:/app/.streamlit/config.toml:ro
      - esa-audit:/app/.esa_audit
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  esa-audit:
