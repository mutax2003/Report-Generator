# Ecoventure brand (https://www.ecoventure.ca — slate #2e3540, magenta #b24292)
[theme]
primaryColor = "#b24292"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f4f6f8"
textColor = "#2e3540"
font = "sans serif"

# Align with security.MAX_* limits (values in MB)
[server]
maxUploadSize = 30
# XSRF protection requires CORS; do not set enableCORS=false with XSRF on.
enableXsrfProtection = true
headless = true

[browser]
gatherUsageStats = false
# Do not set serverAddress=localhost — breaks Streamlit Community Cloud share URLs.
