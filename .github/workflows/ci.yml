# CI: Phase II / groundwater / project-folder CLI E2E run on ubuntu (see docs/08-testing.md).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: |
          ruff check esa_*.py audit_trail.py qp_signature.py records_retention.py job_queue.py automate/multipart.py automate/http_server.py render_service.py ui/helpers.py

      - name: Ruff format check
        run: |
          ruff format --check esa_*.py audit_trail.py qp_signature.py records_retention.py job_queue.py automate/multipart.py automate/http_server.py render_service.py ui/helpers.py

      - name: Mypy (production modules)
        run: |
          mypy --follow-imports=skip esa_logging.py esa_auth.py esa_tenant.py esa_rate_limit.py esa_observability.py audit_trail.py qp_signature.py records_retention.py job_queue.py automate/multipart.py

      - name: Build HTML help pack
        run: python scripts/build_help.py

      - name: Unit tests with coverage
        run: coverage run -m unittest discover -s tests -q

      - name: Coverage report
        run: coverage report --fail-under=50

      - name: Validation evidence package
        run: python scripts/validation_evidence.py

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate samples
        run: python scripts/create_samples.py

      - name: Generate appendix templates
        run: python scripts/create_appendix_templates.py

      - name: Build HTML help pack
        run: python scripts/build_help.py

      - name: Tag production template
        run: python scripts/tag_production_template.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Streamlit AppTest smoke
        run: python scripts/streamlit_smoke.py

      - name: Full E2E chain (Python 3.11 only)
        if: matrix.python-version == '3.11'
        run: |
          python scripts/render_cli.py
          python scripts/phase1_package_smoke.py
          python scripts/production_e2e.py
          python scripts/phase1_alberta_e2e.py
          python scripts/phase2_alberta_e2e.py
          python scripts/groundwater_e2e.py
          python scripts/create_phase2_project_folder.py
          python scripts/ingest_project_folder.py --folder user_test/phase2_alberta --render --no-llm
          python scripts/test_with_your_documents.py
          python scripts/create_ecoventure_dwda_fixture.py
          python scripts/dwda_workflow_e2e.py
          python scripts/phase3_remediation_e2e.py
          python scripts/reclamation_e2e.py
          python scripts/health_check.py

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows deploy folder
        shell: pwsh
        run: .\scripts\build_windows_deploy.ps1 -SkipExe

      - name: Verify deploy output
        shell: pwsh
        run: |
          if (-not (Test-Path dist\ESA-Report-Generator\runtime\.venv\Scripts\python.exe)) {
            throw "Missing bundled runtime python"
          }
          if (-not (Test-Path dist\ESA-Report-Generator\help\index.html)) {
            throw "Missing help/index.html in deploy package"
          }

      - name: Post-build health check
        shell: pwsh
        run: dist\ESA-Report-Generator\runtime\.venv\Scripts\python.exe scripts\health_check.py
        working-directory: dist\ESA-Report-Generator

      - name: Post-build Streamlit AppTest smoke
        shell: pwsh
        run: dist\ESA-Report-Generator\runtime\.venv\Scripts\python.exe scripts\streamlit_smoke.py
        working-directory: dist\ESA-Report-Generator
