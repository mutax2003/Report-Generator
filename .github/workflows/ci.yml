# CI: Phase II / groundwater / project-folder CLI E2E run on ubuntu (see docs/08-testing.md).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate samples
        run: python scripts/create_samples.py

      - name: Generate appendix templates
        run: python scripts/create_appendix_templates.py

      - name: Tag production template
        run: python scripts/tag_production_template.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: CLI smoke render
        run: python scripts/render_cli.py

      - name: CLI deliverable package smoke
        run: python scripts/phase1_package_smoke.py

      - name: Production E2E render
        run: python scripts/production_e2e.py

      - name: Alberta Phase I E2E (Ecoventure)
        run: python scripts/phase1_alberta_e2e.py

      - name: Alberta Phase II E2E
        run: python scripts/phase2_alberta_e2e.py

      - name: Groundwater monitoring E2E
        run: python scripts/groundwater_e2e.py

      - name: Create Phase II project folder fixture
        run: python scripts/create_phase2_project_folder.py

      - name: Project folder CLI render smoke
        run: python scripts/ingest_project_folder.py --folder user_test/phase2_alberta --render --no-llm

      - name: User document test script (Alberta defaults)
        run: python scripts/test_with_your_documents.py

      - name: Create Ecoventure DWDA fixture
        run: python scripts/create_ecoventure_dwda_fixture.py

      - name: DWDA workflow E2E
        run: python scripts/dwda_workflow_e2e.py

      - name: Seventeen-step health check
        run: python scripts/health_check.py

  windows-smoke:
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows deploy folder
        shell: pwsh
        run: .\scripts\build_windows_deploy.ps1 -SkipExe

      - name: Verify deploy output
        shell: pwsh
        run: |
          if (-not (Test-Path dist\ESA-Report-Generator\runtime\.venv\Scripts\python.exe)) {
            throw "Missing bundled runtime python"
          }

      - name: Post-build health check
        shell: pwsh
        run: dist\ESA-Report-Generator\runtime\.venv\Scripts\python.exe scripts\health_check.py
        working-directory: dist\ESA-Report-Generator
